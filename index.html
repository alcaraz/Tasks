<!DOCTYPE html>
<html lang="fr">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Tâches</title>
     <link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Nunito:wght@300;400;600&display=swap"
rel="stylesheet">
     <link rel="stylesheet" href="tasks.css?t=456">
</head>
<body>
<div id="top-buttons">
   <button id="ajouter-liste">Nouvelle liste</button>
   <button id="saveBtn">💾 Sauvegarder</button>
   <button id="exporter-json">Exporter JSON</button>

   <div class="settings-container">
     <button id="settings-btn">⚙️</button>
   </div>
</div>

<div id="container-listes"></div>
<div id="menu-contextuel" class="menu-contextuel">
   <div data-action="supprimer">Supprimer</div>
   <div data-action="vers-tdj">Tâches du jour</div>
   <div data-action="retour">Retour liste</div>
</div>
<script src="tasks.js"></script>
     <!-- Bouton discret -->


<!-- Fenêtre modale -->
<div id="modal-settings" class="modal">
   <div class="modal-content">
     <h3>Paramètres GitHub</h3>

     <label>Token GitHub :</label>
     <input id="input-token" type="text" placeholder="Collez votre token
ici">

     <div class="actions">
       <button id="save-token">Enregistrer</button>
       <button id="delete-token">Supprimer</button>
       <button id="close-settings">Fermer</button>
     </div>

     <p id="status-token"></p>
   </div>
</div>
<script>
// Ouvrir la fenêtre
document.getElementById("settings-btn").onclick = () => {
   document.getElementById("modal-settings").style.display = "block";

   // Pré-remplir si un token existe
   const t = localStorage.getItem("github_token");
   document.getElementById("input-token").value = t || "";
   document.getElementById("status-token").textContent = t
     ? "Token actuellement enregistré."
     : "Aucun token enregistré.";
};

// Fermer la fenêtre
document.getElementById("close-settings").onclick = () => {
   document.getElementById("modal-settings").style.display = "none";
};

// Enregistrer le token
document.getElementById("save-token").onclick = () => {
   const t = document.getElementById("input-token").value.trim();
   if (t) {
     localStorage.setItem("github_token", t);
     document.getElementById("status-token").textContent = "Token
enregistré.";
   }
};

// Supprimer le token
document.getElementById("delete-token").onclick = () => {
   localStorage.removeItem("github_token");
   document.getElementById("input-token").value = "";
   document.getElementById("status-token").textContent = "Token supprimé.";
};
</script>

</body>
</html>
